<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>প্রো ক্যালকুলেটর - ডিলিট হিস্ট্রি</title>
    <style>
        :root {
            --primary-bg: #4682B4; 
            --card-bg: #F8FBFF;
            --btn-num: #ffffff;
            --btn-op: #B0C4DE;
            --btn-special: #FFB6C1;
            --btn-equal: #2C3E50;
            --text-main: #2C3E50;
            --danger: #e74c3c;
        }

        .dark-mode {
            --primary-bg: #000000;
            --card-bg: #121212;
            --btn-num: #333333;
            --btn-op: #f39c12;
            --btn-special: #e74c3c;
            --btn-equal: #3498db;
            --text-main: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }

        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background-color: var(--card-bg);
            display: flex; flex-direction: column;
        }

        .calculator {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5px 10px 5px;
        }

        .app-title {
            font-size: 20px; font-weight: 800; letter-spacing: 1px;
            color: var(--text-main); text-transform: uppercase;
        }

        .settings-icon {
            width: 44px; height: 44px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        
        .settings-icon svg { width: 24px; height: 24px; fill: var(--text-main); }

        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 30px;
        }

        .screen {
            width: 100%;
            background: transparent;
            border: none;
            text-align: right;
            font-size: 65px;
            color: var(--text-main);
            font-weight: 200;
            outline: none;
            padding: 0 10px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding-bottom: 40px;
        }

        .btn {
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: none;
            background-color: var(--btn-num);
            color: var(--text-main);
            font-size: 30px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }

        .btn:active { transform: scale(0.9); }

        .op-btn { background-color: var(--btn-op); font-size: 34px; }
        .clear-btn { background-color: var(--btn-special); font-size: 22px; }
        .equal-btn { background-color: var(--btn-equal); color: white; }

        /* সেটিংস প্যানেল */
        #settings-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 100; backdrop-filter: blur(15px);
        }

        .settings-content {
            background: var(--card-bg); color: var(--text-main);
            width: 85%; max-width: 380px; margin: 10vh auto; padding: 30px;
            border-radius: 35px;
        }

        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        
        .switch { position: relative; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background: #ccc; border-radius: 34px; transition: 0.4s; cursor: pointer; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.4s; }
        input:checked + .slider { background: #4682B4; }
        input:checked + .slider:before { transform: translateX(22px); }

        .history-header { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        
        /* ডিলিট বাটন স্টাইল */
        .clear-history-btn {
            background: none; border: none; color: var(--danger);
            font-size: 14px; font-weight: bold; cursor: pointer;
            padding: 5px 10px; border-radius: 8px;
            transition: background 0.2s;
        }
        .clear-history-btn:active { background: rgba(231, 76, 60, 0.1); }

        .hist-box { 
            height: 150px; overflow-y: auto; 
            background: rgba(0,0,0,0.05); padding: 15px; 
            border-radius: 20px; font-size: 16px; margin-top: 10px;
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .close-btn { width: 100%; padding: 16px; background: var(--btn-equal); border: none; border-radius: 20px; color: white; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="header">
        <div class="app-title" id="app-title">Calculator</div>
        <div class="settings-icon" onclick="toggleSettings()">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12c0,0.31,0.02,0.65,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.5c-1.93,0-3.5-1.57-3.5-3.5 s1.57-3.5,3.5-3.5s3.5,1.57,3.5,3.5S13.93,15.5,12,15.5z"/></svg>
        </div>
    </div>

    <div class="display-container">
        <input type="text" id="screen" class="screen" readonly placeholder="0">
    </div>

    <div class="buttons-grid">
        <button class="btn clear-btn" onclick="press('AC')">AC</button>
        <button class="btn op-btn" onclick="press('C')">C</button>
        <button class="btn op-btn" onclick="press('%')">%</button>
        <button class="btn op-btn" onclick="press('÷')">÷</button>
        
        <button class="btn" onclick="press('7')">7</button>
        <button class="btn" onclick="press('8')">8</button>
        <button class="btn" onclick="press('9')">9</button>
        <button class="btn op-btn" onclick="press('×')">×</button>
        
        <button class="btn" onclick="press('4')">4</button>
        <button class="btn" onclick="press('5')">5</button>
        <button class="btn" onclick="press('6')">6</button>
        <button class="btn op-btn" onclick="press('−')">−</button>
        
        <button class="btn" onclick="press('1')">1</button>
        <button class="btn" onclick="press('2')">2</button>
        <button class="btn" onclick="press('3')">3</button>
        <button class="btn op-btn" onclick="press('+')">+</button>
        
        <button class="btn" onclick="press('0')">0</button>
        <button class="btn" onclick="press('.')">.</button>
        <button class="btn op-btn equal-btn" style="grid-column: span 2; border-radius: 50px; aspect-ratio: auto;" onclick="press('=')">=</button>
    </div>
</div>

<div id="settings-modal">
    <div class="settings-content">
        <h2 id="sett-title" style="margin-bottom:20px">Settings</h2>
        <div class="setting-row"><span id="lang-text">Language (Bengali)</span><label class="switch"><input type="checkbox" id="lang-toggle" onchange="updateLang()"><span class="slider"></span></label></div>
        <div class="setting-row"><span id="dark-text">Dark Mode</span><label class="switch"><input type="checkbox" id="dark-toggle" onchange="document.body.classList.toggle('dark-mode')"><span class="slider"></span></label></div>
        <div class="setting-row"><span id="sound-text">Piano Sound</span><label class="switch"><input type="checkbox" id="sound-toggle"><span class="slider"></span></label></div>
        
        <div class="history-header">
            <strong id="hist-title">History:</strong>
            <button id="del-btn-text" class="clear-history-btn" onclick="clearHistory()">Clear All</button>
        </div>
        <div id="history-list" class="hist-box">No Data</div>
        
        <button onclick="toggleSettings()" id="close-btn" class="close-btn">Close</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    let audioCtx = null;
    let history = [];

    const pianoNotes = {
        '1': 261.63, '2': 293.66, '3': 329.63, '4': 349.23, '5': 392.00,
        '6': 440.00, '7': 493.88, '8': 523.25, '9': 587.33, '0': 246.94,
        '+': 659.25, '−': 698.46, '×': 783.99, '÷': 880.00, '=': 987.77,
        'AC': 220.00, 'C': 233.08, '%': 1046.50, '.': 1108.73
    };

    function playTone(freq) {
        if (!document.getElementById('sound-toggle').checked) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.8);
    }

    function press(val) {
        if (pianoNotes[val]) playTone(pianoNotes[val]);
        const currentVal = screen.value;
        const lastChar = currentVal.slice(-1);
        const operators = ['+', '−', '×', '÷', '%', '.'];

        if (val === 'AC') screen.value = '';
        else if (val === 'C') screen.value = currentVal.slice(0, -1);
        else if (val === '=') {
            try {
                if(currentVal === "" || operators.includes(lastChar)) return;
                let mathExpr = currentVal.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                let res = eval(mathExpr);
                if(!Number.isInteger(res)) res = Number(res.toFixed(4));
                history.push(`${currentVal} = ${res}`);
                updateHistoryUI();
                screen.value = res;
            } catch { screen.value = 'Error'; }
        } else {
            if (operators.includes(val)) {
                if (currentVal === "" && val !== '−') return;
                if (operators.includes(lastChar)) {
                    screen.value = currentVal.slice(0, -1) + val;
                    return;
                }
            }
            if(screen.value === 'Error') screen.value = '';
            screen.value += val;
        }
    }

    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    }

    function clearHistory() {
        if(history.length === 0) return;
        const isBn = document.getElementById('lang-toggle').checked;
        if(confirm(isBn ? "আপনি কি সব হিস্ট্রি মুছে ফেলতে চান?" : "Are you sure you want to clear all history?")) {
            history = [];
            updateHistoryUI();
        }
    }

    function updateHistoryUI() {
        const list = document.getElementById('history-list');
        const isBn = document.getElementById('lang-toggle').checked;
        list.innerHTML = history.length ? history.map(h => `<div style="padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.05)">${h}</div>`).reverse().join('') : (isBn ? "কোনো তথ্য নেই" : "No Data");
    }

    function updateLang() {
        const isBn = document.getElementById('lang-toggle').checked;
        document.getElementById('app-title').innerText = isBn ? "ক্যালকুলেটর" : "Calculator";
        document.getElementById('sett-title').innerText = isBn ? "সেটিংস" : "Settings";
        document.getElementById('lang-text').innerText = isBn ? "ভাষা (English)" : "Language (Bengali)";
        document.getElementById('dark-text').innerText = isBn ? "ডার্ক মোড" : "Dark Mode";
        document.getElementById('sound-text').innerText = isBn ? "পিয়ানো সাউন্ড" : "Piano Sound";
        document.getElementById('hist-title').innerText = isBn ? "হিস্ট্রি:" : "History:";
        document.getElementById('del-btn-text').innerText = isBn ? "সব মুছুন" : "Clear All";
        document.getElementById('close-btn').innerText = isBn ? "বন্ধ করুন" : "Close";
        updateHistoryUI();
    }
</script>
</body>
</html>
