<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="header">
  <div class="top">
    <div class="logo">🎓</div>
    <div>
      <h2>LITTLE DIAMOND ACADEMY</h2>
      <p>স্মার্ট প্যারেন্ট পোর্টাল</p>
    </div>
    <div class="lang">EN</div>
  </div>

  <div class="stats">
    <div class="card">
      <h3>95%</h3>
      <p>উপস্থিতি</p>
    </div>

    <div class="card active">
      ✏️<br>হোমওয়ার্ক
    </div>

    <div class="card">
      <h3>80</h3>
      <p>বকেয়া ফি</p>
    </div>
  </div>
</div>

<div class="notice">
  📢 বার্ষিক ক্রীড়া প্রতিযোগিতার ফল প্রকাশ হয়েছে।
</div>

<div class="grid">

  <div class="box">👤<br>প্রোফাইল</div>
  <div class="box">🖼️<br>গ্যালারি</div>
  <div class="box">💬<br>যোগাযোগ</div>

  <div class="box">➕<br>ভর্তি</div>
  <div class="box">📚<br>সিলেবাস</div>
  <div class="box">📄<br>ফলাফল</div>

  <div class="box">🚌<br>পরিবহন</div>
  <div class="box">📍<br>ট্র্যাকিং</div>
  <div class="box">💳<br>পেমেন্ট</div>

</div>

<div class="bottom">
  <div>🏠<br>Home</div>
  <div>🔍<br>Search</div>
  <div>🔔<br>Notice</div>
  <div>⏱️<br>History</div>
</div>

</body>
</html>
